name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python -m unittest discover -v
      - name: Check Python syntax
        run: python -m compileall -q benchmark.py package_successes.py score_results.py
      - name: Verify public site links
        run: python scripts/check_site.py
